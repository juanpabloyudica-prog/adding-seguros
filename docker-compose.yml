version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: adding
      POSTGRES_PASSWORD: adding_dev
      POSTGRES_DB: adding_seguros
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.dev
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://adding:adding_dev@postgres:5432/adding_seguros
      PORT: 3001
    ports:
      - "3001:3001"
    volumes:
      - ./apps/api:/app
      - /app/node_modules
    depends_on:
      - postgres
    command: pnpm dev

volumes:
  postgres_data:
